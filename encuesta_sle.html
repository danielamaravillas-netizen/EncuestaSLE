<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta SLE - Presentador</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 24px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 280px; gap: 28px; align-items: start; }
        .left { display: flex; flex-direction: column; gap: 24px; }
        .right { position: sticky; top: 24px; display: flex; flex-direction: column; gap: 16px; }
        .question-block { background: white; border-radius: 14px; padding: 28px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid #ebebeb; }
        .q-title { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 24px; line-height: 1.3; }
        .result-item { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .result-label { font-size: 15px; font-weight: 600; color: #333; min-width: 28px; }
        .result-bar { flex: 1; height: 38px; background: #f0f0f0; border-radius: 8px; overflow: hidden; }
        .result-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; padding-left: 12px; font-size: 13px; font-weight: 700; color: white; transition: width 0.5s ease; min-width: 52px; }
        .fill-si { background: #378ADD; }
        .fill-no { background: #E24B4A; }
        .result-count { font-size: 16px; font-weight: 700; color: #1a1a1a; min-width: 32px; text-align: right; }
        .qr-box { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid #ebebeb; text-align: center; }
        .qr-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-bottom: 14px; }
        #qrcode { display: flex; justify-content: center; margin-bottom: 14px; }
        .qr-url { font-size: 10px; color: #aaa; word-break: break-all; margin-bottom: 16px; font-family: monospace; }
        .participants-num { font-size: 36px; font-weight: 700; color: #1a1a1a; }
        .participants-lbl { font-size: 12px; color: #aaa; margin-bottom: 12px; }
        .status { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; background: #fff3e0; color: #e65100; margin-bottom: 14px; }
        .status.live { background: #e3f2fd; color: #1565c0; }
        .status.connected { background: #e8f5e9; color: #2e7d32; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .btn-row { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 8px; font-size: 12px; font-weight: 500; background: white; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        .btn:hover { background: #f5f5f5; }
        .btn-reset { color: #E24B4A; border-color: #E24B4A; }
        .firebase-badge { font-size: 10px; color: #aaa; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .right { position: static; } }
    </style>
</head>
<body>
<div class="container">
    <div class="left">
        <div class="question-block">
            <div class="q-title">¿Conoces la misión de la compañía?</div>
            <div class="result-item">
                <div class="result-label">Sí</div>
                <div class="result-bar"><div class="result-fill fill-si" id="q1-si-fill" style="width:0%"><span id="q1-si-pct">0%</span></div></div>
                <div class="result-count" id="q1-si-count">0</div>
            </div>
            <div class="result-item">
                <div class="result-label">No</div>
                <div class="result-bar"><div class="result-fill fill-no" id="q1-no-fill" style="width:0%"><span id="q1-no-pct">0%</span></div></div>
                <div class="result-count" id="q1-no-count">0</div>
            </div>
        </div>
        <div class="question-block">
            <div class="q-title">¿Cuentas con el fondo de pantalla institucional en tu equipo de cómputo?</div>
            <div class="result-item">
                <div class="result-label">Sí</div>
                <div class="result-bar"><div class="result-fill fill-si" id="q2-si-fill" style="width:0%"><span id="q2-si-pct">0%</span></div></div>
                <div class="result-count" id="q2-si-count">0</div>
            </div>
            <div class="result-item">
                <div class="result-label">No</div>
                <div class="result-bar"><div class="result-fill fill-no" id="q2-no-fill" style="width:0%"><span id="q2-no-pct">0%</span></div></div>
                <div class="result-count" id="q2-no-count">0</div>
            </div>
        </div>
    </div>
    <div class="right">
        <div class="qr-box">
            <div class="qr-label">Escanea para participar</div>
            <div id="qrcode"></div>
            <div class="qr-url">danielamaravillas-netizen.github.io/EncuestaSLE/votar.html</div>
            <div class="participants-num" id="total">0</div>
            <div class="participants-lbl">participantes</div>
            <div class="status" id="status-badge"><span class="dot"></span> Conectando...</div>
            <div class="btn-row">
                <button class="btn btn-reset" onclick="resetData()">↺ Reiniciar votos</button>
            </div>
            <div class="firebase-badge">🔴 En vivo · Firebase</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    const firebaseConfig = {
        apiKey: "AIzaSyAjGYsPAZqojQhfuE9WruTVMSeOnI8WMAQ",
        authDomain: "encuestasle.firebaseapp.com",
        databaseURL: "https://encuestasle-default-rtdb.firebaseio.com",
        projectId: "encuestasle",
        storageBucket: "encuestasle.firebasestorage.app",
        messagingSenderId: "276179568423",
        appId: "1:276179568423:web:698934055d0306aaddcb02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const votosRef = ref(db, 'votos');

    const SURVEY_URL = 'https://danielamaravillas-netizen.github.io/EncuestaSLE/votar.html';
    new QRCode(document.getElementById('qrcode'), {
        text: SURVEY_URL, width: 200, height: 200,
        colorDark: '#000000', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
    });

    onValue(votosRef, (snapshot) => {
        const data = snapshot.val() || { q1: { si: 0, no: 0 }, q2: { si: 0, no: 0 } };
        renderAll(data);
        const total = (data.q1?.si || 0) + (data.q1?.no || 0);
        const badge = document.getElementById('status-badge');
        if (total > 0) {
            badge.className = 'status live';
            badge.innerHTML = '<span class="dot"></span> ' + total + ' respuesta' + (total !== 1 ? 's' : '');
        } else {
            badge.className = 'status connected';
            badge.innerHTML = '<span class="dot"></span> En vivo · esperando';
        }
    });

    function renderAll(data) {
        renderQ('q1', data.q1 || { si: 0, no: 0 });
        renderQ('q2', data.q2 || { si: 0, no: 0 });
        const total = (data.q1?.si || 0) + (data.q1?.no || 0);
        document.getElementById('total').textContent = total;
    }

    function renderQ(q, d) {
        const total = (d.si || 0) + (d.no || 0);
        const siPct = total === 0 ? 0 : Math.round(d.si / total * 100);
        const noPct = total === 0 ? 0 : Math.round(d.no / total * 100);
        document.getElementById(q+'-si-fill').style.width = siPct+'%';
        document.getElementById(q+'-no-fill').style.width = noPct+'%';
        document.getElementById(q+'-si-pct').textContent = siPct+'%';
        document.getElementById(q+'-no-pct').textContent = noPct+'%';
        document.getElementById(q+'-si-count').textContent = d.si || 0;
        document.getElementById(q+'-no-count').textContent = d.no || 0;
    }

    window.resetData = function() {
        if (confirm('¿Segura que quieres reiniciar todos los votos?')) {
            set(votosRef, { q1: { si: 0, no: 0 }, q2: { si: 0, no: 0 } });
        }
    };
</script>
</body>
</html>
